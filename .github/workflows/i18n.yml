name: Update Translations

on:
  push:
    paths:
      - 'install.sh'
      - 'scripts/fail2ban_manager.sh'
      - 'scripts/file_manager.sh'
      - 'scripts/traffic_blocker.sh'
      - 'i18n/tools/translate.py'
      - 'i18n/tools/translation_terms.py'
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-translations:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@main
        with:
          persist-credentials: true
      
      - name: Restore translation cache
        id: cache-translations
        uses: actions/cache/restore@main
        with:
          path: i18n/po/cache_*.json
          key: ${{ runner.os }}-translations-${{ hashFiles('i18n/po/*.po') }}
          restore-keys: |
            ${{ runner.os }}-translations-
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext python3 python3-pip i18nspector
          pip3 install polib deep-translator langdetect openai

      - name: Cache Python dependencies
        uses: actions/cache@main
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-polib-deep-translator-langdetect-openai
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Setup directories
        run: |
          mkdir -p i18n/po
          mkdir -p i18n/languages/{en,fa,ru,zh_CN,ko,fr}/LC_MESSAGES
      
      - name: Extract strings from specified scripts
        run: |
          echo "install.sh" > i18n/po/POTFILES.in
          echo "scripts/fail2ban_manager.sh" >> i18n/po/POTFILES.in
          echo "scripts/file_manager.sh" >> i18n/po/POTFILES.in
          echo "scripts/traffic_blocker.sh" >> i18n/po/POTFILES.in
          
          if [ -f i18n/po/xray_install.pot ]; then
            cp i18n/po/xray_install.pot i18n/po/xray_install.pot.old
          fi
          
          xgettext \
            --files-from=i18n/po/POTFILES.in \
            --from-code=UTF-8 \
            --language=Shell \
            --keyword=gettext \
            --package-name=xray_install \
            --package-version=1.0 \
            --msgid-bugs-address=https://github.com/hello-yunshu/Xray_bash_onekey/issues \
            --copyright-holder="yunshu" \
            --output=i18n/po/xray_install.pot
          
          if [ -f i18n/po/xray_install.pot.old ]; then
            if diff <(grep -v '^"POT-Creation-Date:' i18n/po/xray_install.pot) \
                     <(grep -v '^"POT-Creation-Date:' i18n/po/xray_install.pot.old) > /dev/null 2>&1; then
              mv i18n/po/xray_install.pot.old i18n/po/xray_install.pot
              echo "No string changes detected. Preserving original .pot file."
            else
              rm -f i18n/po/xray_install.pot.old
              echo "String changes detected. Using new .pot file."
            fi
          fi
      
      - name: Update/Create PO files
        run: |
          for lang in zh_CN en fa ru ko fr; do
            if [ -f "i18n/po/$lang.po" ]; then
              msgmerge --previous --update --backup=none "i18n/po/$lang.po" i18n/po/xray_install.pot
            else
              msginit --no-translator --locale=$lang --input=i18n/po/xray_install.pot --output=i18n/po/$lang.po
            fi
          done
      
      - name: Auto translate
        run: python3 i18n/tools/translate.py
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
      
      - name: Compile MO files if necessary
        run: |
          needs_compile=false
          for lang in en fa ru ko fr; do
            if [ ! -f "i18n/po/${lang}.po.no-update" ]; then
              needs_compile=true
              if ! msgfmt --check -v --statistics -o i18n/languages/${lang}/LC_MESSAGES/xray_install.mo i18n/po/${lang}.po; then
                echo "Error in ${lang}.po file:"
                cat i18n/po/${lang}.po
              fi
            fi
          done
          if [ "$needs_compile" = false ]; then
            echo "No translations were updated. Skipping MO file compilation."
          fi
      
      - name: Run i18nspector checks on PO files
        run: |
          i18nspector check i18n/po/
      
      - name: Run i18nspector checks on MO files if compiled
        run: |
          for lang in en fa ru ko fr; do
            if [ ! -f "i18n/po/${lang}.po.no-update" ] && [ -f "i18n/languages/${lang}/LC_MESSAGES/xray_install.mo" ]; then
              i18nspector check-binary i18n/languages/${lang}/LC_MESSAGES/xray_install.mo
            fi
          done
      
      - name: Save translation cache
        if: always() && steps.cache-translations.outputs.cache-hit != 'true'
        uses: actions/cache/save@main
        with:
          path: i18n/po/cache_*.json
          key: ${{ runner.os }}-translations-${{ hashFiles('i18n/po/*.po') }}
      
      - name: Pull changes
        run: |
          git pull origin main
      
      - name: Commit changes if necessary
        run: |
          for lang in en fa ru ko fr; do
            if [ -f "i18n/po/${lang}.po.no-update" ]; then
              rm "i18n/po/${lang}.po.no-update"
            fi
          done
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add i18n/po/*.po i18n/po/*.pot i18n/po/POTFILES.in i18n/languages/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update translations for all languages [$(date +%Y-%m-%d)]"
            git push
          fi
